<!DOCTYPE html>
<html lang="en">
	<head>
		<meta name="viewport" charset="UTF-8" content="width=device-width, initial-scale=1.0"/>
		<title>Process Scheduler</title>
		<link rel="stylesheet" href="./build/output.css">
	</head>
	<body>
		<main class="flex justify-center items-center flex-col p-8">
			<div class="pb-10">
				<h1 class="text-5xl font-medium">Process Scheduler</h1>
			</div>
			<div class="border p-4">
				<div class="flex gap-4">
					<div class="shadow-xl hover:scale-110 transition-all text-xl p-10 rounded text-white font-medium bg-blue-600 w-10 h-40 flex justify-center items-center">
						P1
					</div>
					<div class="shadow-xl hover:scale-110 transition-all text-xl p-10 rounded text-white font-medium bg-red-600 w-10 h-40 flex justify-center items-center">
						P2
					</div>
					<div class="shadow-xl hover:scale-110 transition-all text-xl p-10 rounded text-white font-medium bg-green-600 w-10 h-40 flex justify-center items-center">
						P3
					</div>
					<div class="shadow-xl hover:scale-110 transition-all text-xl p-10 rounded text-white font-medium bg-pink-600 w-10 h-40 flex justify-center items-center">
						P4
					</div>
					<div class="shadow-xl hover:scale-110 transition-all text-xl p-10 rounded text-white font-medium bg-orange-600 w-10 h-40 flex justify-center items-center">
						P5
					</div>
				</div>
				<div class="pt-4 text-center">Current Remaining Time of Process: <span>30sec</span></div>
			</div>
			<div class="bg-orange-600 p-6 pt-4 rounded fixed left-8 top-8 h-1/4 min-h-max text-white shadow-xl text-lg">
				<h1 class="text-3xl font-medium pb-2">Process Queue</h1>
				<ul class="list-disc pl-4">
					<li>Process 1</li>
					<li>Process 4</li>
					<li>Process 2</li>
					<li>Process 5</li>
				</ul>
			</div>
			<div class="bg-green-600 p-6 pt-4 rounded fixed right-8 top-8 h-1/4 min-h-max text-white shadow-xl text-lg">
				<h1 class="text-3xl font-medium pb-2">Gantt Chart</h1>
				<ul class="list-disc pl-4">
					<!-- This will Contain Gannt Chart -->
				</ul>
			</div>
			<div class="border fixed bottom-8 p-4 right-1/4 left-1/4 flex flex-col">
				<h1 class="text-2xl w-full text-center pb-4">Process Controller</h1>
				<div class="flex flex-row gap-4 justify-evenly">
					<label class="w-min flex flex-col">
						<span>Enter Process Name</span>
						<input id="NameInput" placeholder="Enter new process name" class="p-1 border rounded" type="text">
					</label>
					<label class="w-min flex flex-col">
						<span>Enter Process Duration</span>
						<input id="DurationInput" placeholder="Enter new process duration" class="p-1 border rounded" max="300" type="number">
					</label>
				</div>
				<button class="bg-blue-400 p-1 pl-3 pr-3 mt-2 rounded text-white cursor-pointer hover:scale-110 hover:bg-blue-600 transition-all" id="addProcessBtn">Add</button>
			</div>
		</main>
		<script src="./script.js"></script>
	</body>
</html>
