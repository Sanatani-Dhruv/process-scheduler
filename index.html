<!DOCTYPE html>
<html lang="en">
	<head>
		<meta name="viewport" charset="UTF-8" content="width=device-width, initial-scale=1.0"/>
		<title>Process Scheduler</title>
		<link rel="stylesheet" href="./build/output.css">
	</head>
	<body class="transition-all">
		<main class="flex justify-center items-center flex-col p-8">
			<div class="pb-10">
				<h1 class="text-5xl font-medium">Process Scheduler</h1>
			</div>
			<div class="border p-4">
				<div id="processBlock" class="flex gap-4"></div>
				<div class="pt-4 text-center">Current Remaining Time of Process: <span id="remainingTimeBox">0</span>s</div>
			</div>
			<div class="bg-orange-600 p-6 pt-4 rounded fixed left-8 top-8 h-1/4 min-h-max text-white shadow-xl text-lg">
				<h1 class="text-3xl font-medium pb-2">Process Queue</h1>
				<ul class="list-disc pl-4">
					<li>Process 1</li>
					<li>Process 4</li>
					<li>Process 2</li>
					<li>Process 5</li>
				</ul>
			</div>
			<div class="bg-green-600 p-6 pt-4 rounded fixed right-8 top-8 h-1/4 min-h-max text-white shadow-xl text-lg">
				<h1 class="text-3xl font-medium pb-2">Gantt Chart</h1>
				<ul class="list-disc pl-4">
					<!-- This will Contain Gannt Chart -->
				</ul>
			</div>
			<div id="processAddBlock" class="border fixed bottom-8 p-4 right-1/4 left-1/4 flex flex-col">
				<h1 class="text-2xl w-full text-center pb-4">Process Controller</h1>
				<div class="flex flex-row gap-4 justify-evenly">
					<label class="w-min flex flex-col">
						<span>Enter Process Name</span>
						<input id="nameInput" placeholder="Enter new process name" class="p-1 border rounded" type="text" value="P1">
					</label>
					<label class="w-min flex flex-col">
						<span>Enter Process Duration</span>
						<input id="durationInput" placeholder="Enter new process duration" class="p-1 border rounded" max="300" type="number" value="12">
					</label>
				</div>
				<button class="bg-blue-400 p-1 pl-3 pr-3 mt-2 rounded text-white cursor-pointer font-bold hover:scale-101 hover:bg-blue-600 transition-all" id="addProcessBtn">Add</button>
			</div>
			<div class="fixed right-10 bottom-10">
				<button id="runBtn" class="bg-blue-400 p-1 pl-3 pr-3 mt-2 rounded text-white cursor-pointer font-bold hover:scale-105 hover:bg-blue-600 transition-all">Run Processes</button>
			</div>
			<div id="notifications" class="transition-all fixed left-0 bottom-0 p-6 flex flex-col gap-4"></div>
		</main>
		<script src="./script.js"></script>
	</body>
</html>
